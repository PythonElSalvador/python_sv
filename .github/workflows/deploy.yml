name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --dev
      - uses: j178/prek-action@v2

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run pytest -x -q

  build:
    needs: [prek, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ACR
        uses: docker/login-action@v4
        with:
          registry: pythonsvcr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            pythonsvcr.azurecr.io/pythonsv:latest
            pythonsvcr.azurecr.io/pythonsv:${{ github.sha }}

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        uses: azure/cli@v3
        with:
          inlineScript: |
            az containerapp update \
              --name pythonsv \
              --resource-group pythonsv \
              --image pythonsvcr.azurecr.io/pythonsv:${{ github.sha }}
