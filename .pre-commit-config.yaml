repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        pass_filenames: false
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check
        language: system
        pass_filenames: false
        types: [python]

      - id: mypy
        name: mypy
        entry: uv run mypy src/python_sv/
        language: system
        pass_filenames: false
        types: [python]

      - id: ty
        name: ty
        entry: uv run ty check src/python_sv/
        language: system
        pass_filenames: false
        types: [python]

      - id: pytest
        name: pytest
        entry: uv run pytest -x -q
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-push]
